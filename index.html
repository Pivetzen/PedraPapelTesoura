<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🕹 Pedra Papel e Tesoura 🕹</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #2a2a40);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            width: 90%;
            max-width: 450px;
        }

        .score {
            display: flex;
            justify-content: center;
            gap: 40px;
            font-size: 1.2rem;
            margin-bottom: 20px;
        }

        .badge {
            background: #ff4757;
            padding: 5px 15px;
            border-radius: 10px;
            font-weight: bold;
        }

        /* Área de Comparação Visual */
        .battle-area {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin: 20px 0;
            padding: 15px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 15px;
            min-height: 100px;
        }

        .battle-box {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .symbol {
            font-size: 3.5rem;
            display: block;
        }

        .label {
            font-size: 0.8rem;
            text-transform: uppercase;
            opacity: 0.7;
        }

        .choices {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
        }

        button {
            font-size: 2.5rem;
            padding: 15px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            background: white;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        button:hover {
            transform: scale(1.2);
            background: #00d2ff;
        }

        #result {
            font-size: 1.4rem;
            font-weight: bold;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Jokenpô</h1>
        
        <div class="score">
            <div>Você: <span id="player-score">0</span></div>
            <div class="badge">VS</div>
            <div>CPU: <span id="cpu-score">0</span></div>
        </div>

        <div class="battle-area">
            <div class="battle-box">
                <span class="label">Você</span>
                <span id="player-view" class="symbol">❔</span>
            </div>
            <div style="font-size: 2rem;">⚡</div>
            <div class="battle-box">
                <span class="label">CPU</span>
                <span id="cpu-view" class="symbol">❔</span>
            </div>
        </div>

        <div class="choices">
            <button onclick="play('pedra')">✊</button>
            <button onclick="play('papel')">✋</button>
            <button onclick="play('tesoura')">✌️</button>
        </div>

        <div id="result">Escolha sua jogada!</div>
    </div>

    <script>
        let pScore = 0;
        let cScore = 0;

        function play(playerChoice) {
            const options = ['pedra', 'papel', 'tesoura'];
            const cpuChoice = options[Math.floor(Math.random() * 3)];
            
            // Mapeamento de emojis para visualização
            const emojis = { 
                pedra: '✊', 
                papel: '✋', 
                tesoura: '✌️' 
            };

            // Atualiza os símbolos na área de batalha
            document.getElementById('player-view').innerText = emojis[playerChoice];
            document.getElementById('cpu-view').innerText = emojis[cpuChoice];

            const resultDisplay = document.getElementById('result');

            if (playerChoice === cpuChoice) {
                resultDisplay.innerHTML = "EMPATE! 🤝";
                resultDisplay.style.color = "#ffa502";
            } else if (
                (playerChoice === 'pedra' && cpuChoice === 'tesoura') ||
                (playerChoice === 'papel' && cpuChoice === 'pedra') ||
                (playerChoice === 'tesoura' && cpuChoice === 'papel')
            ) {
                resultDisplay.innerHTML = "GANHOU! 🎉";
                resultDisplay.style.color = "#2ed573";
                pScore++;
            } else {
                resultDisplay.innerHTML = "PERDEU! 💀";
                resultDisplay.style.color = "#ff4757";
                cScore++;
            }

            document.getElementById('player-score').innerText = pScore;
            document.getElementById('cpu-score').innerText = cScore;
        }
    </script>
</body>
</html>
