<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jokenpô Dev Edition</title>
    <style>
        /* CSS - O Visual do Jogo */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #2a2a40);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.18);
        }

        .choices {
            display: flex;
            gap: 20px;
            margin: 30px 0;
        }

        button {
            font-size: 3rem;
            padding: 20px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            background: white;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        button:hover {
            transform: scale(1.1) translateY(-5px);
            background: #e0e0e0;
        }

        button:active {
            transform: scale(0.9);
        }

        #result {
            font-size: 1.5rem;
            font-weight: bold;
            margin-top: 20px;
            min-height: 1.6em;
        }

        .score {
            display: flex;
            gap: 40px;
            font-size: 1.2rem;
            margin-bottom: 20px;
        }

        .badge {
            background: #ff4757;
            padding: 5px 15px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Pedra, Papel ou Tesoura</h1>
        
        <div class="score">
            <div>Jogador: <span id="player-score">0</span></div>
            <div class="badge">VS</div>
            <div>CPU: <span id="cpu-score">0</span></div>
        </div>

        <div class="choices">
            <button onclick="play('pedra')">🪨</button>
            <button onclick="play('papel')">📄</button>
            <button onclick="play('tesoura')">✂️</button>
        </div>

        <div id="result">Escolha uma opção para começar!</div>
    </div>

    <script>
        // JavaScript - A Lógica do Jogo
        let pScore = 0;
        let cScore = 0;

        function play(playerChoice) {
            const options = ['pedra', 'papel', 'tesoura'];
            const cpuChoice = options[Math.floor(Math.random() * 3)];
            
            const emojis = { pedra: '🪨', papel: '📄', tesoura: '✂️' };
            const resultDisplay = document.getElementById('result');

            if (playerChoice === cpuChoice) {
                resultDisplay.innerHTML = `Empate! Ambos escolheram ${emojis[cpuChoice]}`;
                resultDisplay.style.color = "#ffa502";
            } else if (
                (playerChoice === 'pedra' && cpuChoice === 'tesoura') ||
                (playerChoice === 'papel' && cpuChoice === 'pedra') ||
                (playerChoice === 'tesoura' && cpuChoice === 'papel')
            ) {
                resultDisplay.innerHTML = `Você Venceu! ${emojis[playerChoice]} ganha de ${emojis[cpuChoice]}`;
                resultDisplay.style.color = "#2ed573";
                pScore++;
            } else {
                resultDisplay.innerHTML = `Você Perdeu! ${emojis[cpuChoice]} ganha de ${emojis[playerChoice]}`;
                resultDisplay.style.color = "#ff4757";
                cScore++;
            }

            document.getElementById('player-score').innerText = pScore;
            document.getElementById('cpu-score').innerText = cScore;
        }
    </script>
</body>
</html>
