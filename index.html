<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🕹 Pedra Papel e Tesoura 🕹</title>
    <style>
        :root {
            --primary: #00d2ff;
            --success: #2ed573;
            --danger: #ff4757;
            --warning: #ffa502;
            --bg: #1e1e2f;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--bg), #2a2a40);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow-y: auto; /* Mude de hidden para auto */
            padding: 20px 0;  /* Adicione um respiro nas bordas */
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            width: 90%;
            max-width: 500px;
        }

        .mode-selector {
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .mode-btn {
            background: #4b4b6b;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        .mode-btn.active {
            background: var(--primary);
            font-weight: bold;
            box-shadow: 0 0 15px var(--primary);
        }

        .score {
            display: flex;
            justify-content: center;
            gap: 30px;
            font-size: 1.1rem;
            margin-bottom: 20px;
        }

        .badge {
            background: var(--danger);
            padding: 2px 12px;
            border-radius: 8px;
            font-weight: bold;
        }

        .battle-area {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin: 20px 0;
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 15px;
            border: 1px dashed rgba(255,255,255,0.2);
        }

        .symbol { font-size: 3.5rem; display: block; margin-top: 5px; transition: 0.5s; }
        .label { font-size: 0.75rem; text-transform: uppercase; opacity: 0.6; letter-spacing: 1px; }

        .choices {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        .choices button {
            font-size: 2.5rem;
            padding: 15px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            background: white;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .choices button:hover { transform: scale(1.15) translateY(-5px); background: #f0f0f0; }

        #btn-action {
            margin-top: 25px;
            padding: 12px 40px;
            font-size: 1.1rem;
            border-radius: 30px;
            border: none;
            background: var(--success);
            color: white;
            cursor: pointer;
            font-weight: bold;
            display: none;
            box-shadow: 0 4px 15px rgba(46, 213, 115, 0.4);
        }

        #turn-indicator {
            margin-top: 15px;
            font-weight: bold;
            color: var(--warning);
            height: 20px;
        }

        #result { font-size: 1.5rem; font-weight: bold; margin-top: 20px; min-height: 40px; }

        /* Modal Stlyes */
        #name-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .modal-content {
            background: #2a2a40;
            padding: 30px;
            border-radius: 20px;
            border: 2px solid var(--primary);
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.2);
        }

        .modal-content input {
            display: block;
            width: 200px;
            padding: 12px;
            margin: 15px auto;
            border-radius: 8px;
            border: none;
            outline: none;
        }

        .modal-content button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="name-modal">
        <div class="modal-content">
            <h2 id="modal-title">Configurar Jogadores</h2>
            <input type="text" id="p1-input" placeholder="Nome do Jogador 1">
            <input type="text" id="p2-input" placeholder="Nome do Jogador 2">
            <button onclick="confirmNames()">COMEÇAR JOGO</button>
        </div>
    </div>

    <div class="container">
        <div class="mode-selector">
            <button id="btn-cpu" class="mode-btn active" onclick="changeMode('CPU')">💻 vs CPU</button>
            <button id="btn-pvp" class="mode-btn" onclick="changeMode('PVP')">👥 Local PvP</button>
        </div>

        <div class="score">
            <div><span id="p1-name-label">Jogador 1</span>: <span id="p1-score">0</span></div>
            <div class="badge">VS</div>
            <div><span id="p2-name-label">CPU</span>: <span id="p2-score">0</span></div>
        </div>

        <div class="battle-area">
            <div>
                <span class="label" id="p1-label-battle">P1</span>
                <span id="p1-view" class="symbol">❔</span>
            </div>
            <div style="font-size: 1.5rem; opacity: 0.3;">X</div>
            <div>
                <span class="label" id="p2-label-battle">CPU</span>
                <span id="p2-view" class="symbol">❔</span>
            </div>
        </div>

        <div id="turn-indicator">Aguardando...</div>

        <div class="choices" id="input-area">
            <button onclick="handleChoice('pedra')">✊</button>
            <button onclick="handleChoice('papel')">✋</button>
            <button onclick="handleChoice('tesoura')">✌️</button>
        </div>

        <button id="btn-action" onclick="revealBattle()">REVELAR JOGADA!</button>

        <div id="result"></div>
        <button id="btn-share" onclick="shareResult()" style="display: none; margin: 10px auto; padding: 10px 20px; background: #25d366; color: white; border: none; border-radius: 20px; cursor: pointer; font-weight: bold; font-size: 0.9rem; align-items: center; gap: 8px;">
            <span>Compartilhar no WhatsApp</span>
        </button>
    </div> <div style="margin-top: 30px; width: 90%; max-width: 500px; text-align: center; background: rgba(255, 255, 255, 0.05); border-radius: 15px; padding: 15px; border: 1px solid rgba(255, 255, 255, 0.1);">
        <p style="font-size: 0.7rem; opacity: 0.5; margin-bottom: 10px; text-transform: uppercase;">Publicidade</p>
        
        <script async="async" data-cfasync="false" src="//pl29004331.profitablecpmratenetwork.com/777f0ae06808ee64f17fd0405a3a1839/invoke.js"></script>
        <div id="container-777f0ae06808ee64f17fd0405a3a1839"></div>
        </div>

    <script>
        let mode = 'CPU';
        let p1Name = "Jogador 1";
        let p2Name = "CPU";
        let p1Score = 0;
        let p2Score = 0;
        let p1Choice = null;
        let p2Choice = null;

        const emojis = { pedra: '✊', papel: '✋', tesoura: '✌️', lock: '🔒', unknown: '❔' };

        // Inicia o processo de nomes ao abrir
        window.onload = () => changeMode('CPU');

        function changeMode(newMode) {
            mode = newMode;
            // Atualiza botões
            document.getElementById('btn-cpu').classList.toggle('active', mode === 'CPU');
            document.getElementById('btn-pvp').classList.toggle('active', mode === 'PVP');
            
            // Configura o Modal
            document.getElementById('modal-title').innerText = mode === 'CPU' ? 'Qual seu nome?' : 'Nomes dos Jogadores';
            document.getElementById('p2-input').style.display = mode === 'CPU' ? 'none' : 'block';
            document.getElementById('name-modal').style.display = 'flex';
            
            resetGame(true);
        }

        function confirmNames() {
            p1Name = document.getElementById('p1-input').value.trim() || "Jogador 1";
            p2Name = mode === 'CPU' ? "CPU" : (document.getElementById('p2-input').value.trim() || "Jogador 2");

            document.getElementById('p1-name-label').innerText = p1Name;
            document.getElementById('p2-name-label').innerText = p2Name;
            document.getElementById('p1-label-battle').innerText = p1Name;
            document.getElementById('p2-label-battle').innerText = p2Name;

            document.getElementById('name-modal').style.display = 'none';
            document.getElementById('turn-indicator').innerText = `Sua vez, ${p1Name}!`;
        }

        function handleChoice(choice) {
            if (mode === 'CPU') {
                p1Choice = choice;
                p2Choice = ['pedra', 'papel', 'tesoura'][Math.floor(Math.random() * 3)];
                revealBattle();
            } else {
                if (!p1Choice) {
                    p1Choice = choice;
                    document.getElementById('p1-view').innerText = emojis.lock;
                    document.getElementById('turn-indicator').innerText = `Agora é a vez de ${p2Name}!`;
                } else if (!p2Choice) {
                    p2Choice = choice;
                    document.getElementById('p2-view').innerText = emojis.lock;
                    document.getElementById('input-area').style.display = 'none';
                    document.getElementById('btn-action').style.display = 'inline-block';
                    document.getElementById('turn-indicator').innerText = "Escolhas feitas! Clique abaixo.";
                }
            }
        }

        function revealBattle() {
            document.getElementById('p1-view').innerText = emojis[p1Choice];
            document.getElementById('p2-view').innerText = emojis[p2Choice];
            
            const result = determineWinner(p1Choice, p2Choice);
            const resDiv = document.getElementById('result');
            resDiv.innerText = result.msg;
            resDiv.style.color = result.color;

            if (result.winner === 1) p1Score++;
            if (result.winner === 2) p2Score++;

            document.getElementById('p1-score').innerText = p1Score;
            document.getElementById('p2-score').innerText = p2Score;

            document.getElementById('input-area').style.display = 'none';
            document.getElementById('btn-action').style.display = 'inline-block';
            document.getElementById('btn-action').innerText = "PRÓXIMA RODADA";
            document.getElementById('btn-action').onclick = () => resetGame(false);
            document.getElementById('btn-share').style.display = 'flex';
        }

        function determineWinner(p1, p2) {
            if (p1 === p2) return { msg: "EMPATE! 🤝", color: '#ffa502', winner: 0 };
            const wins = { pedra: 'tesoura', papel: 'pedra', tesoura: 'papel' };
            
            if (wins[p1] === p2) {
                return { msg: `${p1Name.toUpperCase()} VENCEU! 🎉`, color: '#2ed573', winner: 1 };
            } else {
                return { msg: `${p2Name.toUpperCase()} VENCEU! ${mode === 'CPU' ? '💀' : '🎉'}`, color: '#ff4757', winner: 2 };
            }
        }

        function resetGame(fullReset) {
            if(fullReset) { p1Score = 0; p2Score = 0; }
            p1Choice = null; p2Choice = null;
            document.getElementById('p1-score').innerText = p1Score;
            document.getElementById('p2-score').innerText = p2Score;
            document.getElementById('p1-view').innerText = emojis.unknown;
            document.getElementById('p2-view').innerText = emojis.unknown;
            document.getElementById('result').innerText = "";
            document.getElementById('turn-indicator').innerText = `Sua vez, ${p1Name}!`;
            document.getElementById('input-area').style.display = 'flex';
            document.getElementById('btn-action').style.display = 'none';
            document.getElementById('btn-action').innerText = "REVELAR JOGADA!";
            document.getElementById('btn-action').onclick = revealBattle;
            document.getElementById('btn-share').style.display = 'none';
        }

        function shareResult() {
            const text = `🕹️ Acabei de jogar Pedra, Papel e Tesoura!\n\n🏆 Placar Atual:\n${p1Name}: ${p1Score} pts\n${p2Name}: ${p2Score} pts\n\nDesafio você a me vencer aqui: ${window.location.href}`;
            const url = `https://api.whatsapp.com/send?text=${encodeURIComponent(text)}`;
            window.open(url, '_blank');
        }
        
    </script>
</body>
</html>
