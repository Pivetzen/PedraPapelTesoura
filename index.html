<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🕹 Pedra Papel e Tesoura 🕹</title>
    <style>
        :root {
            --primary: #00d2ff;
            --success: #2ed573;
            --danger: #ff4757;
            --warning: #ffa502;
            --bg: #1e1e2f;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--bg), #2a2a40);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            width: 90%;
            max-width: 500px;
        }

        .mode-selector {
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .mode-btn {
            background: #4b4b6b;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        .mode-btn.active {
            background: var(--primary);
            font-weight: bold;
            box-shadow: 0 0 15px var(--primary);
        }

        .score {
            display: flex;
            justify-content: center;
            gap: 30px;
            font-size: 1.1rem;
            margin-bottom: 20px;
        }

        .badge {
            background: var(--danger);
            padding: 2px 12px;
            border-radius: 8px;
            font-weight: bold;
        }

        .battle-area {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin: 20px 0;
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 15px;
            border: 1px dashed rgba(255,255,255,0.2);
        }

        .symbol { font-size: 3.5rem; display: block; margin-top: 5px; transition: 0.5s; }
        .label { font-size: 0.75rem; text-transform: uppercase; opacity: 0.6; letter-spacing: 1px; }

        .choices {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        .choices button {
            font-size: 2.5rem;
            padding: 15px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            background: white;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .choices button:hover { transform: scale(1.15) translateY(-5px); background: #f0f0f0; }

        #btn-action {
            margin-top: 25px;
            padding: 12px 40px;
            font-size: 1.1rem;
            border-radius: 30px;
            border: none;
            background: var(--success);
            color: white;
            cursor: pointer;
            font-weight: bold;
            display: none;
            box-shadow: 0 4px 15px rgba(46, 213, 115, 0.4);
        }

        #turn-indicator {
            margin-top: 15px;
            font-weight: bold;
            color: var(--warning);
            height: 20px;
        }

        #result { font-size: 1.5rem; font-weight: bold; margin-top: 20px; min-height: 40px; }

        /* Modal Stlyes */
        #name-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .modal-content {
            background: #2a2a40;
            padding: 30px;
            border-radius: 20px;
            border: 2px solid var(--primary);
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.2);
        }

        .modal-content input {
            display: block;
            width: 200px;
            padding: 12px;
            margin: 15px auto;
            border-radius: 8px;
            border: none;
            outline: none;
        }

        .modal-content button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
